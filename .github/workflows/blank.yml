name: demo jobs
on: 
  workflow_dispatch:
    inputs:
      environment:
        description: choose the env
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
       - name: enter the name
         run: |
           echo "My name is ${{ vars.NAME }}"
           echo "I am working in TCS"
           echo "deploy app in ${{ inputs.environment}}"
           echo "${{ toJson(github) }}"
